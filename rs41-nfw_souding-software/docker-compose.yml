services:
  souding-software:
    build: ./backend
    ports:
      - "30014:5000"
    volumes:
      - ./workspace:/workspace          # repos + sketch + build cache (local dir, create before first run)
      - ./logs:/logs                    # compile history: logs/YYYY-MM-DD_HH-MM-SS/ (config + bin + log)
      - ./backend/static:/app/static:ro # served files, mounted read-only
    environment:
      - ALLOW_ZIP_UPLOAD=0              # set to 0 before publishing to allow GitHub fetch only
      # Optional analytics: a raw HTML snippet injected into the page <head>.
      # Leave unset/empty to inject nothing. Example (Umami) - keep it on ONE line:
      # - ANALYTICS_HEAD=<script defer src="https://analytics.example.com/script.js" data-website-id="YOUR-UUID"></script>
      - ANALYTICS_HEAD=
    restart: unless-stopped

    # ----- hardening (safe to expose behind a reverse proxy) -----
    security_opt:
      - no-new-privileges:true          # block setuid privilege escalation
    cap_drop:
      - ALL                             # the app needs no Linux capabilities
    mem_limit: 1.5g                     # cap RAM so a build can't OOM the host
    cpus: "1.25"                        # cap CPU so a build can't starve the host
    pids_limit: 512                     # stop fork bombs
    networks:
      - nfw_net                         # isolated from any other container stacks

networks:
  nfw_net:
    driver: bridge

# Before first run: mkdir -p workspace logs
# Both directories must be writable by uid 1000 (the container's builder user).
# On most Linux hosts: mkdir -p workspace logs && chmod 755 workspace logs
